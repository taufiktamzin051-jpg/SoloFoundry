name: SoloFoundry Factory
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -U google-generativeai
      - name: Run script
        id: run_script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          output=$(python main.py)
          echo "$output"
          if [[ "$output" == *"KONTEN_DIBUAT"* ]]; then
            echo "perlu_commit=true" >> $GITHUB_ENV
          fi
      - name: Push results
        if: env.perlu_commit == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add produk_*.md
          git commit -m "Auto: Update konten harian"
          git push
